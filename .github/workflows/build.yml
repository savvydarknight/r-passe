name: Build

on:
  schedule:
    - cron: '0 0 1 1 *'  # January 1
    - cron: '0 0 1 5 *'  # May 1
    - cron: '0 0 1 9 *'  # September 1
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run generate

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/passport_matrix.json generated/
          git diff --cached --quiet || git commit -m "chore: regenerate [$(date +'%Y-%m-%d')]"
          git push
